---
kind: pipeline
type: exec
name: default

platform:
  os: darwin
  arch: amd64

steps:
- name: dev-build-docker-image
  commands:
  - docker build -t oosa-rewild:dev .
- name: restart service
  commands:
  - docker-compose -f docker-dev.yml down
  - docker-compose -f docker-dev.yml up -d
trigger:
  branch:
  - dev
...